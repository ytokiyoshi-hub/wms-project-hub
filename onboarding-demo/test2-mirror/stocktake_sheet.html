<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>棚卸表</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#f4f5f7;color:#1d2733}
  .topbar{background:#fff;border-bottom:1px solid #e4e7eb;padding:10px 18px;font-size:13px;color:#6c7280}
  .topbar b{color:#1a3a5c}
  .wrap{max-width:880px;margin:22px auto;background:#fff;border:1px solid #e4e7eb;border-radius:8px;padding:28px 30px;box-shadow:0 4px 16px rgba(26,58,92,.06)}
  h1{font-size:22px;color:#1a3a5c;text-align:center;letter-spacing:.1em;margin-bottom:4px}
  .sub{text-align:center;color:#6c7280;font-size:12px;margin-bottom:20px}
  .meta{display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;font-size:13px;border-top:2px solid #1a3a5c;border-bottom:1px solid #e4e7eb;padding:10px 2px;margin-bottom:16px}
  .meta b{color:#1a3a5c}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{background:#1a3a5c;color:#fff;padding:8px 6px;font-weight:600;font-size:12px;border:1px solid #2b5580}
  td{padding:9px 8px;border:1px solid #e4e7eb}
  td.num{text-align:right;font-family:"Roboto Mono",monospace}
  td.write{background:#fafbfc}
  .blank{display:inline-block;min-width:54px;border-bottom:1px solid #9aa3ad;height:16px}
  .note{margin-top:14px;font-size:11px;color:#8a929c;line-height:1.7}
  .sign{display:flex;gap:30px;margin-top:22px;font-size:13px}
  .sign div{flex:1;border-top:1px solid #c4cdd6;padding-top:6px;color:#6c7280}
  .btn{float:right;background:#1a3a5c;color:#fff;border:none;border-radius:6px;padding:7px 16px;font-size:13px;cursor:pointer}
</style></head>
<body>
  <div class="topbar">印刷　/　<b>棚卸表</b>　<button class="btn" onclick="window.print()">印刷（PDF保存）</button></div>
  <div class="wrap">
    <h1>棚 卸 表</h1>
    <div class="sub">実地棚卸（現物カウント用）</div>
    <div class="meta">
      <div><b>倉庫:</b> 自社倉庫（WH001）</div>
      <div><b>荷主:</b> <span id="stk-owner">-</span></div>
      <div><b>棚卸日:</b> 2026-06-03</div>
      <div><b>セッション:</b> STK-2606-001（月次）</div>
    </div>
    <table>
      <thead><tr>
        <th style="width:36px;">#</th><th style="width:88px;">ロケ</th><th style="width:92px;">SKU</th>
        <th>商品名</th><th style="width:96px;">ロット</th><th style="width:96px;">賞味期限</th>
        <th style="width:78px;">帳簿数量<br>(ケース)</th><th style="width:78px;">実数<br>(記入)</th><th style="width:70px;">差異</th>
      </tr></thead>
      <tbody id="stk-body"></tbody>
    </table>
    <div class="note">※ 帳簿数量は棚卸基準時点のスナップショット。実数を記入し、差異があれば在庫調整を起票してください。<br>※ FEFO対象（賞味期限の近いロットから引当）。</div>
    <div class="sign"><div>カウント担当：　　　　　　　　</div><div>確認者：　　　　　　　　</div></div>
  </div>
<script src="../scenarios.js"></script>
<script>
(function(){
  var sid=new URLSearchParams(location.search).get('s'); var SC=null;
  try{ if(window.parent&&window.parent!==window&&window.parent.SC) SC=window.parent.SC; }catch(e){}
  if(!SC) SC=(window.SCENARIOS&&sid&&window.SCENARIOS[sid])||(window.SCENARIOS&&window.SCENARIOS.beverage)||{};
  var cnt=SC.counts||[], inb=SC.inbound||[];
  var byName=function(n){ for(var i=0;i<inb.length;i++) if(inb[i].nm===n) return inb[i]; return {}; };
  var ow=document.getElementById('stk-owner'); if(ow) ow.textContent=(SC.industry||'')+((SC.answers&&SC.answers.owner==='multi')?'（荷主A社）':'（自社）');
  var tot=cnt.reduce(function(s,c){return s+(c.theory||0);},0);
  var tb=document.getElementById('stk-body');
  if(tb) tb.innerHTML=cnt.map(function(c,i){ var pr=byName(c.nm);
    return '<tr><td class="num">'+(i+1)+'</td><td>'+(c.loc||'')+'</td><td>'+(pr.code||'')+'</td><td>'+c.nm+'</td><td>'+(pr.lot||'')+'</td><td>'+(pr.exp||'-')+'</td><td class="num">'+(c.theory||0).toLocaleString()+'</td><td class="write"><span class="blank"></span></td><td class="write"></td></tr>';
  }).join('') + '<tr><td class="num" style="font-weight:700;">計</td><td colspan="5"></td><td class="num" style="font-weight:700;">'+tot.toLocaleString()+'</td><td class="write"></td><td class="write"></td></tr>';
})();
</script>
</body></html>
