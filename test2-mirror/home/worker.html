<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=480, initial-scale=1">
<title>作業メニュー — HT</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #1a1f29; color: white; max-width: 480px; margin: 0 auto; min-height: 100vh; }
  .ht-frame { background: #1a1f29; min-height: 100vh; display: flex; flex-direction: column; }
  .ht-header { background: #1a3a5c; color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #0d2440; }
  .ht-header h1 { font-size: 14px; font-weight: 600; }
  .ht-header .info { font-size: 11px; opacity: 0.85; }
  .back-link { color: white; opacity: 0.85; text-decoration: none; font-size: 11px; }
  .ht-body { flex: 1; padding: 16px; }
  .greeting { background: rgba(255,255,255,0.08); border-radius: 8px; padding: 12px; margin-bottom: 16px; }
  .greeting .name { font-size: 16px; font-weight: 600; }
  .greeting .info { font-size: 11px; opacity: 0.7; margin-top: 2px; }
  .today-summary { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 12px; margin-bottom: 16px; }
  .today-summary .title { font-size: 11px; opacity: 0.7; margin-bottom: 8px; letter-spacing: 0.05em; text-transform: uppercase; }
  .summary-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
  .summary-row .label { opacity: 0.85; }
  .summary-row .value { font-weight: 600; }
  .section-label { font-size: 11px; opacity: 0.6; margin: 16px 0 8px; letter-spacing: 0.1em; text-transform: uppercase; }
  .task-btn { display: block; background: white; color: #1a1f29; border-radius: 8px; padding: 18px 16px; margin-bottom: 12px; text-decoration: none; position: relative; transition: all 0.1s; }
  .task-btn:active { transform: scale(0.98); }
  .task-btn.primary { background: #f59e0b; color: white; }
  .task-btn.primary .meta { color: rgba(255,255,255,0.85); }
  .task-btn .num { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.1); padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .task-btn.primary .num { background: rgba(255,255,255,0.25); }
  .task-btn .title { font-size: 15px; font-weight: 600; }
  .task-btn .meta { font-size: 11px; color: #6c7280; margin-top: 2px; }
  .keypad-hint { margin-top: auto; background: rgba(255,255,255,0.05); border-radius: 8px; padding: 12px; font-size: 11px; opacity: 0.7; line-height: 1.5; }
  .keypad-hint kbd { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 3px; font-family: monospace; font-size: 10px; }
</style>
</head>
<body>
<div class="ht-frame">
  <div class="ht-header">
    <a href="../index.html" class="back-link">←</a>
    <h1>HT 作業メニュー</h1>
    <div class="info">BT-A2000</div>
  </div>

  <div class="ht-body">
    <div class="greeting">
      <div class="name">佐藤 健一 さん</div>
      <div class="info">マルキ食品 / 第1倉庫 / 2026-05-29 09:32</div>
    </div>

    <div class="today-summary">
      <div class="title">本日のあなたの担当</div>
      <div class="summary-row"><span class="label">ピック</span><span class="value">12件 / 48中</span></div>
      <div class="summary-row"><span class="label">検品</span><span class="value">0件 / 5予定</span></div>
      <div class="summary-row"><span class="label">梱包</span><span class="value">0件 / 12予定</span></div>
    </div>

    <div class="section-label">▶ 進行中の作業</div>
    <a href="../ht/pick/wave.html" class="task-btn primary">
      <div class="num">12 件</div>
      <div class="title">ピッキング</div>
      <div class="meta">波 WV-260529-002 進行中</div>
    </a>

    <div class="section-label">▶ その他の作業</div>
    <a href="../ht/inspect/asn.html" class="task-btn">
      <div class="num">5 件</div>
      <div class="title">入荷検品</div>
      <div class="meta">ASN受領待ち</div>
    </a>
    <a href="../ht/packing/order.html" class="task-btn">
      <div class="num">12 件</div>
      <div class="title">梱包</div>
      <div class="meta">ピック完了後に着手</div>
    </a>
    <a href="../ht/putaway/instructions.html" class="task-btn">
      <div class="num">3 件</div>
      <div class="title">棚入れ</div>
      <div class="meta">検品完了分</div>
    </a>
    <a href="../ht/loading/scan.html" class="task-btn">
      <div class="num">0 件</div>
      <div class="title">積込</div>
      <div class="meta">14:00以降</div>
    </a>

    <div class="keypad-hint">
      <strong style="opacity: 0.9; display: block; margin-bottom: 4px;">HT 操作ヒント</strong>
      <kbd>F1</kbd> 戻る ・ <kbd>F2</kbd> 確定 ・ <kbd>SCAN</kbd> バーコード読取
    </div>
  </div>
</div>
</body>
</html>
