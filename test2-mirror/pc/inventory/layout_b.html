<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>在庫照会 [レイアウトB 縮める] — WMS テストサイト2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/test2.css?v=202605290846">
<style>
.layout-switcher { background:#1a3a5c; color:#fff; padding:8px 14px; font-size:12px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
.layout-switcher .lbl { font-weight:600; }
.layout-switcher a { color:#fff; text-decoration:none; padding:3px 10px; border:1px solid rgba(255,255,255,0.3); font-size:11px; }
.layout-switcher a.active { background:#fff; color:#1a3a5c; border-color:#fff; font-weight:600; }
.layout-switcher .desc { color:rgba(255,255,255,0.7); font-size:11px; margin-left:auto; }
/* B案: カードをテーブル幅に合わせる (左寄せ・右はページ余白) */
.card.fit { display: inline-block; width: auto; max-width: 100%; vertical-align: top; }
.card.fit .card-body { width: max-content; max-width: 100%; }
.fit-row { display:flex; align-items:flex-start; gap:14px; flex-wrap:wrap; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="layout-switcher">
      <span class="lbl">在庫照会レイアウト:</span>
      <a href="pc/inventory/layout_a.html">A: 全幅</a>
      <a href="pc/inventory/layout_b.html" class="active">B: テーブル幅に縮める</a>
      <a href="pc/inventory/layout_c.html">C: 2ペイン</a>
      <span class="desc">同じ機能・同じデータ / レイアウトだけ変化</span>
    </div>
    <div class="topbar"><div class="crumb">在庫　/　<b>在庫照会 (W-201)</b><span class="badge">レイアウト B</span></div></div>
    <div class="content">
      <div class="two-pane">

        <!-- 左ペイン: 本体 -->
        <div class="left-pane">
  <div class="card">
          <div class="card-body" style="padding-bottom:0;">
            <div class="filter-row">
              <div class="field"><label>荷主</label><select id="f-owner"><option value="">全件</option></select></div>
              <div style="display:flex; gap:8px; margin-top:8px;">
                <button class="btn primary" onclick="render()">検索</button>
              </div>
              <div class="field"><label>商品コード/JAN</label><input id="f-product" placeholder="例: S-00321"></div>
              <div class="field"><label>ロケコード</label><input id="f-location" placeholder="例: 3AP-02-134"></div>
            </div>
            <div style="display:flex; gap:14px; margin-top:8px; font-size:11px; color:#6b7280; flex-wrap:wrap;">
              <span>行: <b id="s-rows">-</b></span>
              <span>SKU: <b id="s-products">-</b></span>
              <span>ロケ: <b id="s-locations">-</b></span>
              <span>合計数量: <b id="s-total">-</b></span>
              <span style="margin-left:auto;" id="filter-meta">-</span>
            </div>
          </div>
          <div class="card-body flush">
            <table class="list list-full">
              <thead><tr>
                <th class="c-code">荷主</th>
                <th class="c-code">商品コード</th>
                <th class="c-text">商品名</th>
                <th class="c-code">ロケ</th>
                <th class="c-code">ロット</th>
                <th class="c-num">数量</th>
                <th class="c-code">単位</th>
                <th class="c-date">更新日時</th>
              </tr></thead>
              <tbody id="tb-inv"></tbody>
            </table>
          </div>
        </div>
        </div>

        <!-- 右ペイン: 在庫系業務情報 -->
        <div class="right-pane">

          <div class="card">
            <div class="card-header"><span>在庫サマリ</span><span class="meta" style="font-size:11px; color:#9ca3af;">本日</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">総在庫</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">フリー在庫</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">引当済</span><span class="val mute">-</span></div>
              <div class="summary-row"><span class="lbl">使用ロケ数</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>要対応在庫</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">欠品リスク</span><span class="val alert">-</span></div>
              <div class="summary-row"><span class="lbl">期限切迫 (30日)</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">長期滞留 (90日)</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>直近の変動</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="mini-list">
              <div class="row"><span class="code">入荷</span><span class="name">直近の入荷</span><span class="when">14:35</span></div>
              <div class="row"><span class="code">出荷</span><span class="name">直近の出荷</span><span class="when">11:02</span></div>
              <div class="row"><span class="code">調整</span><span class="name">在庫調整</span><span class="when">昨日</span></div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </main>
</div>
<script>
const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let allRows = [];
async function loadOwners() {
  const owners = await fetch('/api/owners').then(r => r.json()).catch(() => []);
  const sel = document.getElementById('f-owner');
  owners.forEach(o => sel.insertAdjacentHTML('beforeend', `<option value="${escapeHtml(o.code)}">${escapeHtml(o.code)} ${escapeHtml(o.name)}</option>`));
}
async function loadInventory() {
  allRows = await fetch('/api/inventory').then(r => r.json()).catch(() => []);
  render();
}
function render() {
  const ownerF = document.getElementById('f-owner').value;
  const prodF = document.getElementById('f-product').value.trim().toLowerCase();
  const locF = document.getElementById('f-location').value.trim().toLowerCase();
  const rows = allRows.filter(r => {
    if (ownerF && r.owner_code !== ownerF) return false;
    if (prodF && !(r.product_code || '').toLowerCase().includes(prodF) && !(r.jan_code || '').toLowerCase().includes(prodF)) return false;
    if (locF && !(r.location_code || '').toLowerCase().includes(locF)) return false;
    return true;
  });
  const DISPLAY_LIMIT = 200;
  const shown = Math.min(rows.length, DISPLAY_LIMIT);
  document.getElementById('s-rows').textContent = rows.length;
  document.getElementById('s-products').textContent = new Set(rows.map(r => r.product_code)).size;
  document.getElementById('s-locations').textContent = new Set(rows.map(r => r.location_code)).size;
  document.getElementById('s-total').textContent = rows.reduce((s, r) => s + (r.qty || 0), 0);
  document.getElementById('filter-meta').textContent = `全${allRows.length} / 該当${rows.length} / 表示${shown}`;
  const tb = document.getElementById('tb-inv');
  if (rows.length === 0) {
    tb.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:20px; color:#9ca3af;">在庫データなし</td></tr>';
    return;
  }
  tb.innerHTML = rows.slice(0, DISPLAY_LIMIT).map(r => `
    <tr>
      <td class="c-code">${escapeHtml(r.owner_code || '-')}</td>
      <td class="c-code">${escapeHtml(r.product_code || '-')}</td>
      <td class="c-text">${escapeHtml(r.product_name || '-')}</td>
      <td class="c-code">${escapeHtml(r.location_code || '-')}</td>
      <td class="c-code">${escapeHtml(r.lot_no || '-')}</td>
      <td class="c-num text-accent" style="font-weight:600;">${r.qty ?? '-'}</td>
      <td class="c-code">${escapeHtml(r.unit_top || '-')}</td>
      <td class="c-date">${escapeHtml(r.updated_at || '-')}</td>
    </tr>
  `).join('');
}
(async () => { await loadOwners(); await loadInventory(); })();
</script>
