<meta charset="UTF-8">
<title>ロット追跡 — WMS テストサイト2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/test2.css?v=202605290846">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar"><div class="crumb">在庫　/　<b>ロット追跡</b><span class="badge">PHASE 1</span></div></div>
    <div class="content">
      <div class="two-pane">

        <!-- 左ペイン: 本体 -->
        <div class="left-pane">
  <div class="card"><div class="card-body">
          <div class="filter-row">
            <div class="field"><label>ロットNo</label><input id="f-lot" placeholder="例: L260518-01"></div>
            <div class="field"><label>商品コード</label><input id="f-product"></div>
            <div class="field"><label>荷主</label><select id="f-owner"><option value="">全件</option></select></div>
          </div>
          <div style="display:flex; gap:8px; margin-top:12px;">
            <button class="btn primary" onclick="render()">検索</button>
            <span id="stats" style="font-size:12px; color:var(--c-text-sub); margin-left:8px;">-</span>
          </div>
        </div></div>
        <div class="card">
          <div class="card-header"><span>ロット一覧</span><span class="meta" id="meta">-</span></div>
          <div class="card-body flush">
            <table class="list list-full">
              <thead><tr>
                <th class="c-code">ロットNo</th>
                <th class="c-text">商品</th>
                <th class="c-code">荷主</th>
                <th class="c-date">製造日</th>
                <th class="c-date">賞味期限</th>
                <th class="c-num">残在庫</th>
                <th class="c-status">状態</th>
                <th class="c-action">操作</th>
              </tr></thead>
              <tbody id="tb"></tbody>
            </table>
          </div>
        </div>
        </div>

        <!-- 右ペイン: 在庫系業務情報 -->
        <div class="right-pane">

          <div class="card">
            <div class="card-header"><span>在庫サマリ</span><span class="meta" style="font-size:11px; color:#9ca3af;">本日</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">総在庫</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">フリー在庫</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">引当済</span><span class="val mute">-</span></div>
              <div class="summary-row"><span class="lbl">使用ロケ数</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>要対応在庫</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">欠品リスク</span><span class="val alert">-</span></div>
              <div class="summary-row"><span class="lbl">期限切迫 (30日)</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">長期滞留 (90日)</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>直近の変動</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="mini-list">
              <div class="row"><span class="code">入荷</span><span class="name">直近の入荷</span><span class="when">14:35</span></div>
              <div class="row"><span class="code">出荷</span><span class="name">直近の出荷</span><span class="when">11:02</span></div>
              <div class="row"><span class="code">調整</span><span class="name">在庫調整</span><span class="when">昨日</span></div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </main>
</div>
<script>
const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let all = [];
async function init() {
  const owners = await fetch('/api/owners').then(r=>r.json()).catch(()=>[]);
  const sel = document.getElementById('f-owner');
  owners.forEach(o => { const opt = document.createElement('option'); opt.value = o.code; opt.textContent = `${o.code} ${o.name}`; sel.appendChild(opt); });
  all = await fetch('/api/inventory/lots').then(r=>r.json()).catch(()=>[]);
  render();
}
function render() {
  const l = document.getElementById('f-lot').value.trim().toLowerCase();
  const p = document.getElementById('f-product').value.trim().toLowerCase();
  const o = document.getElementById('f-owner').value;
  const rows = (all || []).filter(x => {
    if (l && !(x.lot_no || '').toLowerCase().includes(l)) return false;
    if (p && !(x.product_code || '').toLowerCase().includes(p)) return false;
    if (o && x.owner_code !== o) return false;
    return true;
  });
  const DISPLAY_LIMIT = 100;
  const shown = Math.min(rows.length, DISPLAY_LIMIT);
  document.getElementById('stats').textContent = `全${(all||[]).length}件 / 該当${rows.length}件 / 表示${shown}件`;
  document.getElementById('meta').textContent = `該当${rows.length}件中 ${shown}件表示${rows.length > DISPLAY_LIMIT ? ' (絞り込みで件数を減らしてください)' : ''}`;
  const tb = document.getElementById('tb');
  if (rows.length === 0) { tb.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:24px; color:var(--c-text-sub);">ロットデータなし</td></tr>'; return; }
  tb.innerHTML = rows.slice(0, DISPLAY_LIMIT).map(x => `
    <tr>
      <td class="c-code"><span style="color:var(--c-accent); font-weight:600;">${escapeHtml(x.lot_no || '-')}</span></td>
      <td class="c-text"><div style="font-family:var(--f-mono);">${escapeHtml(x.product_code || '-')}</div><div style="font-size:11px; color:var(--c-text-sub);">${escapeHtml(x.product_name || '')}</div></td>
      <td class="c-code">${escapeHtml(x.owner_code || '-')}</td>
      <td class="c-date">${escapeHtml(x.manufactured_at || '-')}</td>
      <td class="c-date">${escapeHtml(x.expiry_date || '-')}</td>
      <td class="c-num">${x.qty ?? '-'}</td>
      <td class="c-status"><span class="pill ${x.status === 'available' ? 'silent' : 'silent'}">${escapeHtml(x.status || '-')}</span></td>
      <td class="c-action"><button class="btn sm" onclick="alert('「移動履歴」モック動作（実装は後続フェーズ）')">移動履歴</button></td>
    </tr>
  `).join('');
}
init();
</script>
<script src="js/nav-manifest.js?v=202605290846"></script>
<script src="js/common-layout.js?v=202605290846"></script>
<script src="js/common-inventory-stats.js?v=202605202324"></script>
</body>
</html>
