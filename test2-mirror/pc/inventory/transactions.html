<meta charset="UTF-8">
<title>在庫トランザクションログ — WMS テストサイト2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/test2.css?v=202605290846">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar"><div class="crumb">在庫　/　<b>トランザクションログ（実 API: /api/inventory/transactions）</b><span class="badge">PHASE 1</span></div></div>
    <div class="content">
      <div class="two-pane">

        <!-- 左ペイン: 本体 -->
        <div class="left-pane">
  <div class="card"><div class="card-body">
          <div class="filter-row">
            <div class="field"><label>種別</label><select id="f-type"><option value="">全て</option><option value="inbound">入庫</option><option value="outbound">出庫</option><option value="move">移動</option><option value="adjust">調整</option><option value="stocktake">棚卸</option></select></div>
            <div class="field"><label>商品コード</label><input id="f-product"></div>
            <div class="field"><label>ロケ</label><input id="f-loc"></div>
          </div>
          <div style="display:flex; gap:8px; margin-top:8px;">
            <button class="btn primary" onclick="loadData()">検索</button>
            <button class="btn" onclick="clearFilters()">クリア</button>
            <span id="meta" style="margin-left:auto; font-size:12px; color:var(--c-text-sub);">-</span>
          </div>
        </div></div>
  
        <div class="card">
          <div class="card-header"><span>在庫変動ログ</span></div>
          <div class="card-body flush">
            <table class="list list-full">
              <thead><tr>
                <th class="c-date">日時</th>
                <th class="c-status">種別</th>
                <th class="c-code">商品</th>
                <th class="c-code">ロケ</th>
                <th class="c-code">ロット</th>
                <th class="c-num">数量</th>
                <th class="c-code">関連伝票</th>
                <th class="c-text">担当</th>
              </tr></thead>
              <tbody id="tb"><tr><td colspan="8" style="text-align:center; padding:20px; color:var(--c-text-sub);">読み込み中...</td></tr></tbody>
            </table>
          </div>
        </div>
        </div>

        <!-- 右ペイン: 在庫系業務情報 -->
        <div class="right-pane">

          <div class="card">
            <div class="card-header"><span>在庫サマリ</span><span class="meta" style="font-size:11px; color:#9ca3af;">本日</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">総在庫</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">フリー在庫</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">引当済</span><span class="val mute">-</span></div>
              <div class="summary-row"><span class="lbl">使用ロケ数</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>要対応在庫</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">欠品リスク</span><span class="val alert">-</span></div>
              <div class="summary-row"><span class="lbl">期限切迫 (30日)</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">長期滞留 (90日)</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>直近の変動</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="mini-list">
              <div class="row"><span class="code">入荷</span><span class="name">直近の入荷</span><span class="when">14:35</span></div>
              <div class="row"><span class="code">出荷</span><span class="name">直近の出荷</span><span class="when">11:02</span></div>
              <div class="row"><span class="code">調整</span><span class="name">在庫調整</span><span class="when">昨日</span></div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </main>
</div>
<script>
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let allTxns = [];
async function loadData() {
  try {
    allTxns = await fetch('/api/inventory/transactions').then(r => r.json());
    render();
  } catch (e) {
    document.getElementById('tb').innerHTML = `<tr><td colspan="8" style="text-align:center; padding:20px; color:var(--c-alert);">読込失敗: ${esc(e.message)}</td></tr>`;
  }
}
function render() {
  const type = document.getElementById('f-type').value;
  const prod = document.getElementById('f-product').value.trim().toUpperCase();
  const loc = document.getElementById('f-loc').value.trim().toUpperCase();
  const filtered = (allTxns || []).filter(t => {
    if (type && t.txn_type !== type) return false;
    if (prod && !(t.product_code || '').toUpperCase().includes(prod)) return false;
    if (loc && !(t.location_code || '').toUpperCase().includes(loc)) return false;
    return true;
  });
  const DISPLAY_LIMIT = 100;
  const shown = Math.min(filtered.length, DISPLAY_LIMIT);
  document.getElementById('meta').textContent = `全${allTxns.length}件 / 該当${filtered.length}件 / 表示${shown}件${filtered.length > DISPLAY_LIMIT ? ' (絞り込みで件数を減らしてください)' : ''}`;
  const tb = document.getElementById('tb');
  if (filtered.length === 0) {
    tb.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:20px; color:var(--c-text-sub);">該当データなし</td></tr>';
    return;
  }
  tb.innerHTML = filtered.slice(0, DISPLAY_LIMIT).map(t => {
    const pill = t.txn_type === 'outbound' ? 'alert' : 'silent';
    const sign = (t.qty || 0) > 0 ? '+' : '';
    return `
      <tr>
        <td class="c-date">${esc(t.created_at || '')}</td>
        <td class="c-status"><span class="pill ${pill}">${esc(t.txn_type)}</span></td>
        <td class="c-code">${esc(t.product_code)}</td>
        <td class="c-code">${esc(t.location_code || '-')}</td>
        <td class="c-code">${esc(t.lot_no || '-')}</td>
        <td class="c-num ${(t.qty || 0) < 0 ? 'text-alert' : (t.qty || 0) > 0 ? 'text-accent' : ''}">${sign}${t.qty || 0}</td>
        <td class="c-code">${esc(t.ref_no || '-')}</td>
        <td class="c-text">${esc(t.user_name || '-')}</td>
      </tr>
    `;
  }).join('');
}
function clearFilters() {
  document.getElementById('f-type').value = '';
  document.getElementById('f-product').value = '';
  document.getElementById('f-loc').value = '';
  render();
}
loadData();
</script>
<script src="js/nav-manifest.js?v=202605290846"></script>
<script src="js/common-layout.js?v=202605290846"></script>
<script src="js/common-inventory-stats.js?v=202605202324"></script>
</body>
</html>
