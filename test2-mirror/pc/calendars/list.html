<!DOCTYPE html>
<html lang="ja">
<head>
<base href="/wms-project-hub/test2-mirror/">
<meta charset="UTF-8">
<title>カレンダー — WMS テストサイト2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/test2.css?v=202605282215">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar"><div class="crumb"><b>カレンダー一覧</b><span class="badge">PHASE 1</span></div></div>
    <div class="content">
      <div class="two-pane">

        <!-- 左ペイン: 本体 -->
        <div class="left-pane">
  <div class="card"><div class="card-body">
          <div class="form-row">
            <div class="field"><label>種別</label><select><option>倉庫カレンダー</option><option>配送業者カレンダー</option><option>荷主カレンダー</option></select></div>
            <div class="field"><label>対象月</label><input type="month" value="2026-06"></div>
          </div>
        </div></div>
  
        <div class="card">
          <div class="card-header"><span>2026年6月 倉庫稼働カレンダー</span></div>
          <div class="card-body">
            <table style="width:100%; border-collapse:separate; border-spacing:2px; font-size:11px;">
              <thead>
                <tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr>
              </thead>
              <tbody>
                <tr><td style="border:1px solid var(--c-line); padding:6px; height:50px; background:#fff0f0; color:var(--c-alert);">休</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">1</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">2</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">3</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">4</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">5</td><td style="border:1px solid var(--c-line); padding:6px; height:50px; background:#f4f5f7;">6</td></tr>
                <tr><td style="border:1px solid var(--c-line); padding:6px; height:50px; background:#fff0f0; color:var(--c-alert);">休</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">8</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">9</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">10</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">11</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">12</td><td style="border:1px solid var(--c-line); padding:6px; height:50px; background:#f4f5f7;">13</td></tr>
                <tr><td style="border:1px solid var(--c-line); padding:6px; height:50px; background:#fff0f0; color:var(--c-alert);">休</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">15</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">16</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">17</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">18</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">19</td><td style="border:1px solid var(--c-line); padding:6px; height:50px; background:var(--c-accent-lt); color:var(--c-accent);">特</td></tr>
                <tr><td style="border:1px solid var(--c-line); padding:6px; height:50px; background:#fff0f0; color:var(--c-alert);">休</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">22</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">23</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">24</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">25</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">26</td><td style="border:1px solid var(--c-line); padding:6px; height:50px; background:#f4f5f7;">27</td></tr>
                <tr><td style="border:1px solid var(--c-line); padding:6px; height:50px; background:#fff0f0; color:var(--c-alert);">休</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">29</td><td style="border:1px solid var(--c-line); padding:6px; height:50px;">30</td><td></td><td></td><td></td><td></td></tr>
              </tbody>
            </table>
            <div style="font-size:11px; color:var(--c-text-sub); margin-top:10px;">
              <span style="display:inline-block; width:14px; height:14px; background:#fff0f0; vertical-align:middle;"></span> 休業日
              <span style="display:inline-block; width:14px; height:14px; background:#f4f5f7; vertical-align:middle;"></span> 土曜稼働
              <span style="display:inline-block; width:14px; height:14px; background:var(--c-accent-lt); vertical-align:middle;"></span> 特別稼働（繁忙期）
            </div>
          </div>
        </div>
        </div>

        <!-- 右ペイン: 汎用業務情報 -->
        <div class="right-pane">

          <div class="card">
            <div class="card-header"><span>サマリ</span><span class="meta" style="font-size:11px; color:#9ca3af;">本日</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">合計</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">アクティブ</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">本日追加</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>関連情報</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="mini-list">
              <div class="row"><span class="code">関連1</span><span class="name">関連項目の一例</span><span class="when">→</span></div>
              <div class="row"><span class="code">関連2</span><span class="name">関連項目の一例</span><span class="when">→</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>最近の活動</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="mini-list">
              <div class="row"><span class="code">更新</span><span class="name">直近の更新</span><span class="when">14:35</span></div>
              <div class="row"><span class="code">追加</span><span class="name">本日の追加</span><span class="when">11:02</span></div>
              <div class="row"><span class="code">編集</span><span class="name">直前の編集</span><span class="when">昨日</span></div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </main>
</div>
<script src="js/nav-manifest.js?v=202605282215"></script>
<script src="js/common-layout.js?v=202605282215"></script>
<script src="js/common-generic-stats.js?v=202605202324"></script>
</body>
</html>
