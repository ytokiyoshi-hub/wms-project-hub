<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>返品処理一覧 — WMS テストサイト2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/test2.css?v=202605282215">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar"><div class="crumb">返品　/　<b>返品処理一覧</b><span class="badge">PHASE 1</span></div></div>
    <div class="content">
      <div class="two-pane">

        <!-- 左ペイン: 本体 -->
        <div class="left-pane">
  <div class="card"><div class="card-body">
          <div class="filter-row">
            <div class="field"><label>返品No</label><input id="f-no"></div>
              <div style="display:flex; gap:8px; margin-top:8px;">
                <button class="btn primary" onclick="render()">検索</button>
              </div>
            <div class="field"><label>荷主</label><select id="f-owner"><option value="">全件</option></select></div>
            <div class="field"><label>状態</label><select id="f-st"><option value="">全て</option><option>検品中</option><option>検品済</option><option>承認待ち</option><option>完了</option></select></div>
          </div>
        </div></div>
        <div class="card">
          <div class="card-header"><span>返品一覧</span><span class="meta">3件中 3件表示</span></div>
          <div class="card-body flush">
            <table class="list list-full">
              <thead><tr>
                <th>返品No</th><th>荷主</th><th>顧客</th><th>受付日</th><th class="right">明細数</th><th>原因区分</th><th class="center">状態</th><th class="center" style="width:160px;">操作</th>
              </tr></thead>
              <tbody>
                <tr><td class="num">RT-26060101</td><td class="num">MK001</td><td>東京食品センター</td><td class="num">2026-06-01</td><td class="right num">3</td><td>顧客都合</td><td class="center"><span class="pill accent">承認待ち</span></td><td class="center"><button class="btn sm" onclick="alert('「詳細」モック動作（実装は後続フェーズ）')">詳細</button><button class="btn primary sm" onclick="location.href='/pc/returns/restock_approval.html'">承認へ</button></td></tr>
                <tr><td class="num">RT-26060102</td><td class="num">EC001</td><td>横浜EC物流</td><td class="num">2026-06-02</td><td class="right num">1</td><td>不良品</td><td class="center"><span class="pill alert">廃棄申請</span></td><td class="center"><button class="btn sm" onclick="alert('「詳細」モック動作（実装は後続フェーズ）')">詳細</button><button class="btn danger sm" onclick="location.href='/pc/returns/disposal_approval.html'">廃棄承認へ</button></td></tr>
                <tr><td class="num">RT-26053101</td><td class="num">MK001</td><td>営業課A</td><td class="num">2026-05-31</td><td class="right num">2</td><td>誤配送</td><td class="center"><span class="pill">完了</span></td><td class="center"><button class="btn sm" onclick="alert('「詳細」モック動作（実装は後続フェーズ）')">詳細</button></td></tr>
              </tbody>
            </table>
          </div>
        </div>
        </div>

        <!-- 右ペイン: 入出荷/業務系情報 -->
        <div class="right-pane">

          <div class="card">
            <div class="card-header"><span>本日サマリ</span><span class="meta" style="font-size:11px; color:#9ca3af;">本日</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">合計</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">完了</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">進行中</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">待ち</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>進捗</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">SLA達成</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">SLA遅延</span><span class="val alert">-</span></div>
              <div class="summary-row"><span class="lbl">平均処理時間</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>要対応</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="mini-list">
              <div class="row"><span class="code">遅延</span><span class="name">SLA超過案件</span><span class="when">14:20</span></div>
              <div class="row"><span class="code">差異</span><span class="name">数量不一致</span><span class="when">12:08</span></div>
              <div class="row"><span class="code">保留</span><span class="name">承認待ち</span><span class="when">昨日</span></div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </main>
</div>
<script>
(async () => {
  const owners = await fetch('/api/owners').then(r=>r.json()).catch(()=>[]);
  const sel = document.getElementById('f-owner');
  owners.forEach(o => { const opt = document.createElement('option'); opt.value = o.code; opt.textContent = `${o.code} ${o.name}`; sel.appendChild(opt); });
})();
</script>
<script src="js/nav-manifest.js?v=202605282215"></script>
<script src="js/common-layout.js?v=202605282215"></script>
<script src="js/common-inout-stats.js?v=202605202324"></script>
</body>
</html>
