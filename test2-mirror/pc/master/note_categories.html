<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>メモカテゴリマスタ — WMS テストサイト2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/test2.css?v=202605282215">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar"><div class="crumb">マスタ　/　<b>メモカテゴリ</b><span class="badge">PHASE 1</span></div></div>
    <div class="content">
      <div class="two-pane">

        <!-- 左ペイン: 本体 -->
        <div class="left-pane">
  <div class="card">
          <div class="card-header"><span>メモカテゴリ</span><button class="btn primary sm" onclick="alert('「新規登録」モック動作（実装は後続フェーズ）')">新規登録</button></div>
          <div class="card-body flush">
            <table class="list list-full">
              <thead><tr><th class="c-code">コード</th><th class="c-text">名称</th><th class="c-text">用途</th><th class="c-text">表示色</th><th class="c-action">操作</th></tr></thead>
              <tbody>>
                <tr><td class="text-accent c-code">CAT01</td><td class="c-text">業務改善</td><td class="c-text">現場からの改善提案</td><td class="c-text">青</td><td class="c-action"><button class="btn sm" onclick="alert('「編集」モック動作（実装は後続フェーズ）')">編集</button></td></tr>
                <tr><td class="text-accent c-code">CAT02</td><td class="c-text">仕様変更要求</td><td class="c-text">1号への要望</td><td class="c-text">橙</td><td class="c-action"><button class="btn sm" onclick="alert('「編集」モック動作（実装は後続フェーズ）')">編集</button></td></tr>
                <tr><td class="text-accent c-code">CAT03</td><td class="c-text">不具合報告</td><td class="c-text">システム動作不良</td><td class="c-text">赤</td><td class="c-action"><button class="btn sm" onclick="alert('「編集」モック動作（実装は後続フェーズ）')">編集</button></td></tr>
                <tr><td class="text-accent c-code">CAT04</td><td class="c-text">申し送り</td><td class="c-text">シフト交代時の引継ぎ</td><td class="c-text">緑</td><td class="c-action"><button class="btn sm" onclick="alert('「編集」モック動作（実装は後続フェーズ）')">編集</button></td></tr>
                <tr><td class="text-accent c-code">CAT05</td><td class="c-text">顧客連絡</td><td class="c-text">顧客からの問合せ</td><td class="c-text">紫</td><td class="c-action"><button class="btn sm" onclick="alert('「編集」モック動作（実装は後続フェーズ）')">編集</button></td></tr>
              </tbody>
            </table>
          </div>
        </div>
        </div>

        <!-- 右ペイン: マスタ系業務情報 -->
        <div class="right-pane">

          <div class="card">
            <div class="card-header"><span>マスタの状況</span><span class="meta" style="font-size:11px; color:#9ca3af;">※モック含</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">登録件数</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">アクティブ</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">休止</span><span class="val mute">-</span></div>
              <div class="summary-row"><span class="lbl">本日追加</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>データ品質</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">必須項目欠損</span><span class="val mute">0件</span></div>
              <div class="summary-row"><span class="lbl">コード重複</span><span class="val mute">0件</span></div>
              <div class="summary-row"><span class="lbl">未使用</span><span class="val mute">0件</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>最近の追加・編集</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="mini-list">
              <div class="row"><span class="code">追加</span><span class="name">最新エントリ</span><span class="when">14:35</span></div>
              <div class="row"><span class="code">編集</span><span class="name">直前の編集</span><span class="when">11:02</span></div>
              <div class="row"><span class="code">追加</span><span class="name">2つ前</span><span class="when">昨日</span></div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </main>
</div>
<script src="js/nav-manifest.js?v=202605282215"></script>
<script src="js/common-layout.js?v=202605282215"></script>
<script src="js/common-master-stats.js?v=202605202258"></script>
</body>
</html>
