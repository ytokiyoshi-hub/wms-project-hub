<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ユーザーマスタ — WMS テストサイト2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/test2.css?v=202605282215">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar"><div class="crumb">マスタ　/　<b>ユーザーマスタ（B-7 / T系）</b><span class="badge">PHASE 1</span></div></div>
    <div class="content">
      <div class="two-pane">

        <!-- 左ペイン: 本体 -->
        <div class="left-pane">
  <div class="card"><div class="card-body">
          <div class="filter-row">
            <div class="field"><label>検索</label><input id="f-q"></div>
            <div class="field"><label>ロール</label><select><option>全件</option><option>admin 管理者</option><option>leader リーダー</option><option>worker 作業者</option><option>owner 荷主担当</option></select></div>
            <div class="field"><label>荷主</label><select id="f-owner"><option value="">全件</option></select></div>
          </div>
          <div style="display:flex; gap:8px; margin-top:12px;">
            <button class="btn primary" onclick="render()">検索</button>
            <button class="btn primary" style="margin-left:auto;" onclick="alert('「招待 / 直接作成」モック動作（実装は後続フェーズ）')">招待 / 直接作成</button>
          </div>
        </div></div>
        <div class="card">
          <div class="card-header"><span>ユーザー一覧</span><span class="meta" id="meta">-</span></div>
          <div class="card-body flush">
            <table class="list list-full">
              <thead><tr>
                <th class="c-text">ログインID</th><th class="c-text">表示名</th><th class="c-text">ロール</th><th class="c-code">所属荷主</th><th class="c-text">招待元</th><th class="c-status">状態</th><th class="c-action" style="width:140px;">操作</th>
              </tr></thead>
              <tbody id="tb"></tbody>
            </table>
          </div>
        </div>
  
        <div class="note-box">
          <div class="text-bold text-accent" style="margin-bottom:4px;">ユーザー招待 2系統（U-7 Phase E）</div>
          メール招待フロー（標準）/ 管理者直接作成（例外・初期PW + 強制変更）
        </div>
        </div>

        <!-- 右ペイン: マスタ系業務情報 -->
        <div class="right-pane">

          <div class="card">
            <div class="card-header"><span>マスタの状況</span><span class="meta" style="font-size:11px; color:#9ca3af;">※モック含</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">登録件数</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">アクティブ</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">休止</span><span class="val mute">-</span></div>
              <div class="summary-row"><span class="lbl">本日追加</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>データ品質</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">必須項目欠損</span><span class="val mute">0件</span></div>
              <div class="summary-row"><span class="lbl">コード重複</span><span class="val mute">0件</span></div>
              <div class="summary-row"><span class="lbl">未使用</span><span class="val mute">0件</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>最近の追加・編集</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="mini-list">
              <div class="row"><span class="code">追加</span><span class="name">最新エントリ</span><span class="when">14:35</span></div>
              <div class="row"><span class="code">編集</span><span class="name">直前の編集</span><span class="when">11:02</span></div>
              <div class="row"><span class="code">追加</span><span class="name">2つ前</span><span class="when">昨日</span></div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </main>
</div>
<script>
const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ROLE_LABEL = { admin: '管理者', leader: 'リーダー', worker: '作業者', owner: '荷主担当' };
let all = [];
async function init() {
  const owners = await fetch('/api/owners').then(r=>r.json()).catch(()=>[]);
  const sel = document.getElementById('f-owner');
  owners.forEach(o => { const opt = document.createElement('option'); opt.value = o.code; opt.textContent = `${o.code} ${o.name}`; sel.appendChild(opt); });
  all = await fetch('/api/system-users').then(r=>r.json()).catch(()=>[]);
  render();
}
function render() {
  const q = document.getElementById('f-q').value.trim().toLowerCase();
  const rows = (all || []).filter(u => !q || u.login_id.toLowerCase().includes(q) || (u.display_name||'').toLowerCase().includes(q));
  document.getElementById('meta').textContent = `${(all||[]).length}件中 ${rows.length}件表示`;
  const tb = document.getElementById('tb');
  if (rows.length === 0) { tb.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:24px; color:var(--c-text-sub);">ユーザーデータなし</td></tr>'; return; }
  tb.innerHTML = rows.map(u => `
    <tr>
      <td class="text-accent text-bold c-text">${escapeHtml(u.login_id)}</td>
      <td class="c-text">${escapeHtml(u.display_name)}</td>
      <td class="c-text">${ROLE_LABEL[u.role] || u.role}</td>
      <td class="c-code">${escapeHtml(u.owner_code || '-')}</td>
      <td class="c-text">${escapeHtml(u.invited_from || 'manual')}</td>
      <td class="c-status"><span class="pill ${u.status === 'active' ? 'accent' : ''}">${escapeHtml(u.status || '-')}</span></td>
      <td class="c-action"><button class="btn sm" onclick="alert('「編集」モック動作（実装は後続フェーズ）')">編集</button> <button class="btn sm" onclick="alert('「PW再発行」モック動作（実装は後続フェーズ）')">PW再発行</button></td>
    </tr>
  `).join('');
}
init();
</script>
<script src="js/nav-manifest.js?v=202605282215"></script>
<script src="js/common-layout.js?v=202605282215"></script>
<script src="js/common-master-stats.js?v=202605202258"></script>
</body>
</html>
