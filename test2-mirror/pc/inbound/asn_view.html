<!DOCTYPE html>
<html lang="ja">
<head>
<base href="/wms-project-hub/test2-mirror/">
<meta charset="UTF-8">
<title>ASN詳細表示 — WMS テストサイト2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/test2.css?v=202605282215">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar"><div class="crumb">入荷　/　ASN詳細　/　<b id="hdr-no">読込中</b><span class="badge">PHASE 1</span></div></div>
    <div class="content">
      <div class="two-pane">

        <!-- 左ペイン: 本体 -->
        <div class="left-pane">
  <div class="card"><div class="card-body">
          <div class="form-row">
            <div class="field"><label>入荷No選択</label><select id="f-id"></select></div>
            <div class="field" style="display:flex; align-items:flex-end;"><button class="btn primary" onclick="loadDetail()">表示</button></div>
          </div>
        </div></div>
  
        <div class="card"><div class="card-header"><span>ASN基本情報</span></div><div class="card-body">
          <div class="form-row">
            <div class="field"><label>ASN番号</label><div class="text-mono text-accent" style="font-weight:600;" id="d-no">-</div></div>
            <div class="field"><label>荷主</label><div id="d-owner">-</div></div>
            <div class="field"><label>仕入先</label><div id="d-supplier">-</div></div>
            <div class="field"><label>予定日</label><div class="text-mono" id="d-date">-</div></div>
          </div>
          <div class="form-row" style="margin-top:14px;">
            <div class="field"><label>asn_no</label><div class="text-mono" id="d-asn">-</div></div>
            <div class="field"><label>登録日時</label><div class="text-mono" id="d-created">-</div></div>
            <div class="field"><label>状態</label><div id="d-status">-</div></div>
            <div class="field"><label>倉庫</label><div class="text-mono" id="d-wh">-</div></div>
          </div>
        </div></div>
  
        <div class="card">
          <div class="card-header"><span>明細</span><span class="meta" id="d-meta">-</span></div>
          <div class="card-body flush">
            <table class="list list-full">
              <thead><tr><th>#</th><th>SKU</th><th>商品名</th><th class="right">予定数</th><th class="right">検品数</th><th>状態</th><th>ロット</th></tr></thead>
              <tbody id="tb-lines"><tr><td colspan="7" style="text-align:center; padding:20px; color:var(--c-text-sub);">入荷Noを選んでください</td></tr></tbody>
            </table>
          </div>
        </div>
  
        <div style="display:flex; gap:8px;">
          <button class="btn" onclick="location.href='pc/inbound/plans.html'">入荷予定一覧へ</button>
          <button class="btn" onclick="location.href='pc/inbound/asn_compare.html'">差分比較</button>
          <button class="btn" onclick="location.href='pc/inbound/asn_history.html'">受信履歴</button>
        </div>
        </div>

        <!-- 右ペイン: 入出荷/業務系情報 -->
        <div class="right-pane">

          <div class="card">
            <div class="card-header"><span>本日サマリ</span><span class="meta" style="font-size:11px; color:#9ca3af;">本日</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">合計</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">完了</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">進行中</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">待ち</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>進捗</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">SLA達成</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">SLA遅延</span><span class="val alert">-</span></div>
              <div class="summary-row"><span class="lbl">平均処理時間</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>要対応</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="mini-list">
              <div class="row"><span class="code">遅延</span><span class="name">SLA超過案件</span><span class="when">14:20</span></div>
              <div class="row"><span class="code">差異</span><span class="name">数量不一致</span><span class="when">12:08</span></div>
              <div class="row"><span class="code">保留</span><span class="name">承認待ち</span><span class="when">昨日</span></div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </main>
</div>
<script>
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let schedules = [];
(async () => {
  schedules = await fetch('/api/inbound-schedules').then(r => r.json()).catch(() => []);
  const sel = document.getElementById('f-id');
  schedules.slice(0, 100).forEach(s => sel.insertAdjacentHTML('beforeend', `<option value="${s.id}">${esc(s.schedule_no)} (${esc(s.owner_code)})</option>`));
  if (schedules.length) { sel.value = schedules[0].id; await loadDetail(); }
})();
async function loadDetail() {
  const id = document.getElementById('f-id').value;
  if (!id) return;
  try {
    const d = await fetch(`/api/inbound-schedules/${id}`).then(r => r.json());
    document.getElementById('hdr-no').textContent = d.schedule_no;
    document.getElementById('d-no').textContent = d.schedule_no;
    document.getElementById('d-owner').textContent = `${d.owner_code} ${d.owner_name || ''}`;
    document.getElementById('d-supplier').textContent = d.supplier_name || '-';
    document.getElementById('d-date').textContent = d.scheduled_date || '-';
    document.getElementById('d-asn').textContent = d.asn_no || '-';
    document.getElementById('d-created').textContent = d.created_at || '-';
    document.getElementById('d-status').innerHTML = `<span class="pill ${d.status === 'completed' ? '' : 'accent'}">${esc(d.status || 'planned')}</span>`;
    document.getElementById('d-wh').textContent = d.warehouse_code || '-';
    const lines = d.lines || [];
    document.getElementById('d-meta').textContent = `${lines.length} 行`;
    const tb = document.getElementById('tb-lines');
    tb.innerHTML = lines.length === 0 ? '<tr><td colspan="7" style="text-align:center; padding:20px; color:var(--c-text-sub);">明細なし</td></tr>'
      : lines.map((l, i) => `
        <tr>
          <td class="num">${i+1}</td>
          <td class="num">${esc(l.product_code)}</td>
          <td>${esc(l.product_name || '-')}</td>
          <td class="right num">${l.expected_qty}</td>
          <td class="right num">${l.inspected_qty ?? '-'}</td>
          <td><span class="pill ${l.status === 'completed' ? '' : 'accent'}">${esc(l.status)}</span></td>
          <td class="num">${esc(l.lot_no || '-')}</td>
        </tr>`).join('');
  } catch (e) { alert('読込失敗: ' + e.message); }
}
</script>
<script src="js/nav-manifest.js?v=202605282215"></script>
<script src="js/common-layout.js?v=202605282215"></script>
<script src="js/common-inout-stats.js?v=202605202324"></script>
</body>
</html>
