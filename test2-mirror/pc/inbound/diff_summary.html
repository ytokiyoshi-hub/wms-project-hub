<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>差異サマリ — WMS テストサイト2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/test2.css?v=202605282215">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar"><div class="crumb">入荷　/　<b>差異サマリ（月次）</b><span class="badge">PHASE 1</span></div></div>
    <div class="content dashboard-compact">
      <div class="two-pane">

        <!-- 左ペイン: 本体 -->
        <div class="left-pane">
  <div class="stats">
          <div class="stat"><div class="label">差異 総数</div><div class="value text-alert" id="kpi-total">-</div><span class="unit">件</span></div>
          <div class="stat"><div class="label">未処理</div><div class="value text-alert" id="kpi-pending">-</div><span class="unit">件</span></div>
          <div class="stat"><div class="label">実数受入</div><div class="value text-accent" id="kpi-accept">-</div><span class="unit">件</span></div>
          <div class="stat"><div class="label">クレーム</div><div class="value text-alert" id="kpi-claim">-</div><span class="unit">件</span></div>
        </div>
  
        <div class="card">
          <div class="card-header"><span>区分別 差異集計（reason_category）</span></div>
          <div class="card-body flush">
            <table class="list list-full">
              <thead><tr><th>区分</th><th class="right">件数</th><th class="right">未処理</th><th class="right">承認済</th></tr></thead>
              <tbody id="tb-cat"><tr><td colspan="4" style="text-align:center; padding:20px; color:var(--c-text-sub);">読み込み中...</td></tr></tbody>
            </table>
          </div>
        </div>
  
        <div class="card">
          <div class="card-header"><span>商品別 差異累計（上位10）</span></div>
          <div class="card-body flush">
            <table class="list list-full">
              <thead><tr><th>商品</th><th class="right">差異件数</th><th class="right">過不足合計</th></tr></thead>
              <tbody id="tb-prod"><tr><td colspan="3" style="text-align:center; padding:20px; color:var(--c-text-sub);">集計中...</td></tr></tbody>
            </table>
          </div>
        </div>
  
        <div style="display:flex; gap:8px;">
          <button class="btn primary" onclick="location.href='/pc/inbound/discrepancy.html'">差異処理画面へ</button>
          <button class="btn" onclick="loadData()">再集計</button>
        </div>
        </div>

        <!-- 右ペイン: ダッシュボード補助情報 -->
        <div class="right-pane">

          <div class="card">
            <div class="card-header"><span>本日のKPI</span><span class="meta" style="font-size:11px; color:#9ca3af;">本日</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">処理件数</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">完了率</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">SLA達成</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">遅延件数</span><span class="val alert">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>比較指標</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">昨日比</span><span class="val accent">+5%</span></div>
              <div class="summary-row"><span class="lbl">先週比</span><span class="val mute">±0%</span></div>
              <div class="summary-row"><span class="lbl">月初累計</span><span class="val">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>要対応</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="mini-list">
              <div class="row"><span class="code">遅延</span><span class="name">SLA超過</span><span class="when">14:20</span></div>
              <div class="row"><span class="code">差異</span><span class="name">数量不一致</span><span class="when">12:08</span></div>
              <div class="row"><span class="code">承認</span><span class="name">承認待ち</span><span class="when">昨日</span></div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </main>
</div>
<script>
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function loadData() {
  try {
    const all = await fetch('/api/discrepancies').then(r => r.json());
    const pending = all.filter(d => d.status === 'pending').length;
    const accept = all.filter(d => d.approval_action === 'accept_actual').length;
    const claim = all.filter(d => d.approval_action === 'claim_supplier').length;
    document.getElementById('kpi-total').textContent = all.length;
    document.getElementById('kpi-pending').textContent = pending;
    document.getElementById('kpi-accept').textContent = accept;
    document.getElementById('kpi-claim').textContent = claim;

    // 区分別
    const byCat = {};
    all.forEach(d => {
      const k = d.reason_category || '(未分類)';
      if (!byCat[k]) byCat[k] = { count: 0, pending: 0, approved: 0 };
      byCat[k].count++;
      if (d.status === 'pending') byCat[k].pending++;
      if (d.status === 'approved') byCat[k].approved++;
    });
    const cats = Object.entries(byCat).sort((a, b) => b[1].count - a[1].count);
    document.getElementById('tb-cat').innerHTML = cats.length === 0
      ? '<tr><td colspan="4" style="text-align:center; padding:20px; color:var(--c-text-sub);">差異なし</td></tr>'
      : cats.map(([k, v]) => `<tr><td>${esc(k)}</td><td class="right num">${v.count}</td><td class="right num ${v.pending > 0 ? 'text-alert' : ''}">${v.pending}</td><td class="right num">${v.approved}</td></tr>`).join('');

    // 商品別
    const byProd = {};
    all.forEach(d => {
      const k = d.product_code;
      if (!byProd[k]) byProd[k] = { count: 0, sum: 0, name: d.product_name || '' };
      byProd[k].count++;
      byProd[k].sum += d.difference || 0;
    });
    const prods = Object.entries(byProd).sort((a, b) => b[1].count - a[1].count).slice(0, 10);
    document.getElementById('tb-prod').innerHTML = prods.length === 0
      ? '<tr><td colspan="3" style="text-align:center; padding:20px; color:var(--c-text-sub);">差異なし</td></tr>'
      : prods.map(([code, v]) => `<tr><td>${esc(code)} ${esc(v.name)}</td><td class="right num">${v.count}</td><td class="right num ${v.sum < 0 ? 'text-alert' : ''}">${v.sum > 0 ? '+' : ''}${v.sum}</td></tr>`).join('');
  } catch (e) {
    document.getElementById('tb-cat').innerHTML = `<tr><td colspan="4" style="text-align:center; padding:20px; color:var(--c-alert);">読込失敗: ${esc(e.message)}</td></tr>`;
  }
}
loadData();
</script>
<script src="js/nav-manifest.js?v=202605282215"></script>
<script src="js/common-layout.js?v=202605282215"></script>
<script src="js/common-inout-stats.js?v=202605202324"></script>
</body>
</html>
