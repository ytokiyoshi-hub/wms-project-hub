<meta charset="UTF-8">
<title>荷主受領通知 — WMS テストサイト2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/test2.css?v=202605290846">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar"><div class="crumb">入荷　/　<b>荷主受領通知（W-413 受領確定）</b><span class="badge">PHASE 1</span></div></div>
    <div class="content">
      <div class="two-pane">

        <!-- 左ペイン: 本体 -->
        <div class="left-pane">
  <div class="note-box">
          <div class="text-bold text-accent" style="margin-bottom:4px;">入荷検品完了→荷主通知（W-413）</div>
          差異込みで検品完了したASNの受領通知を荷主に送信。EDI 856 / Webhook で自動送信。
        </div>
  
        <div class="card">
          <div class="card-header"><span>受領対象（実 API: 検品済の入荷実績）</span><span class="meta" id="meta">-</span></div>
          <div class="card-body flush">
            <table class="list list-full">
              <thead><tr><th>入荷No</th><th>荷主</th><th>仕入先</th><th>商品</th><th class="right">予定</th><th class="right">実績</th><th>差異</th><th>状態</th><th class="center">操作</th></tr></thead>
              <tbody id="tb"><tr><td colspan="9" style="text-align:center; padding:20px; color:var(--c-text-sub);">読み込み中...</td></tr></tbody>
            </table>
          </div>
        </div>
  
        <div style="display:flex; gap:8px;">
          <button class="btn primary" onclick="location.href='pc/inbound/discrepancy.html'">差異処理画面へ</button>
          <button class="btn" onclick="location.href='pc/integration/jobs.html'">送信ジョブ画面（W-510）</button>
          <button class="btn" onclick="loadData()">再読込</button>
        </div>
        </div>

        <!-- 右ペイン: 入出荷/業務系情報 -->
        <div class="right-pane">

          <div class="card">
            <div class="card-header"><span>本日サマリ</span><span class="meta" style="font-size:11px; color:#9ca3af;">本日</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">合計</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">完了</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">進行中</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">待ち</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>進捗</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">SLA達成</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">SLA遅延</span><span class="val alert">-</span></div>
              <div class="summary-row"><span class="lbl">平均処理時間</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>要対応</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="mini-list">
              <div class="row"><span class="code">遅延</span><span class="name">SLA超過案件</span><span class="when">14:20</span></div>
              <div class="row"><span class="code">差異</span><span class="name">数量不一致</span><span class="when">12:08</span></div>
              <div class="row"><span class="code">保留</span><span class="name">承認待ち</span><span class="when">昨日</span></div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </main>
</div>
<script>
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function loadData() {
  try {
    const actuals = await fetch('/api/inbound-actuals').then(r => r.json());
    document.getElementById('meta').textContent = `${actuals.length}件`;
    const tb = document.getElementById('tb');
    if (actuals.length === 0) {
      tb.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:20px; color:var(--c-text-sub);">受領対象なし — 検品完了するとここに表示</td></tr>';
      return;
    }
    tb.innerHTML = actuals.slice(0, 50).map(a => {
      const diff = (a.inspected_qty ?? 0) - a.expected_qty;
      const hasDiff = diff !== 0;
      const rowBg = hasDiff ? 'background:var(--c-alert-lt);' : '';
      const diffCell = hasDiff ? `<span class="pill alert">${diff > 0 ? '+' : ''}${diff}</span>` : '<span class="pill accent">差異なし</span>';
      const action = hasDiff
        ? `<button class="btn sm" onclick="location.href='pc/inbound/discrepancy.html'">差異承認</button>`
        : `<span style="color:var(--c-text-sub); font-size:11px;">受領通知済 (想定)</span>`;
      return `
        <tr style="${rowBg}">
          <td class="num">${esc(a.schedule_no)}</td>
          <td class="num">${esc(a.owner_code)}</td>
          <td>${esc(a.supplier_name || '-')}</td>
          <td>${esc(a.product_code)}</td>
          <td class="right num">${a.expected_qty}</td>
          <td class="right num">${a.inspected_qty ?? '-'}</td>
          <td class="center">${diffCell}</td>
          <td><span class="pill ${a.status === 'completed' ? '' : 'accent'}">${esc(a.status)}</span></td>
          <td class="center">${action}</td>
        </tr>`;
    }).join('');
  } catch (e) {
    document.getElementById('tb').innerHTML = `<tr><td colspan="9" style="text-align:center; padding:20px; color:var(--c-alert);">読込失敗</td></tr>`;
  }
}
loadData();
</script>

</html>
