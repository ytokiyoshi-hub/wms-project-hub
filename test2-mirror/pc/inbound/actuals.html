iv>';var d=document.createElement("div");d.innerHTML=html;var modal=d.firstChild;document.body.appendChild(modal);function close(){modal.remove()}modal.querySelector(".wms-modal-close").onclick=close;var cancel=modal.querySelector(".wms-modal-cancel");if(cancel)cancel.onclick=close;modal.querySelector(".wms-modal-ok").onclick=function(){if(type==="detail"||type==="test"){close();return}var msg=title;if(type==="output")msg+=" をダウンロードしました";else if(type==="delete")msg+=" を削除しました";else if(type==="create")msg+=" を登録しました";else if(type==="edit")msg+=" を保存しました";else if(type==="exec")msg+=" を実行しました";window.clToast?clToast(msg+"（mock）","success"):alert(msg+"（mock）");close()};modal.onclick=function(e){if(e.target===modal)close()}}var styleEl=document.createElement("style");styleEl.textContent='.wms-modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999}.wms-modal{background:#fff;border-radius:8px;max-width:600px;width:90%;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.3)}.wms-modal-head{padding:14px 18px;border-bottom:1px solid #e4e7eb;display:flex;justify-content:space-between;align-items:center}.wms-modal-head h3{margin:0;font-size:16px;color:#1a3a5c}.wms-modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:#666;padding:0;line-height:1}.wms-modal-body{padding:18px;overflow-y:auto;flex:1}.wms-modal-foot{padding:12px 18px;border-top:1px solid #e4e7eb;display:flex;justify-content:flex-end;gap:8px}.wms-modal-foot .btn{padding:6px 16px;border-radius:4px;cursor:pointer;border:1px solid #c4cdd6;background:#fff}.wms-modal-foot .btn.primary{background:#1a3a5c;color:#fff;border-color:#1a3a5c}.wms-form{display:flex;flex-direction:column;gap:10px}.wms-field{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}.wms-field label{font-size:12px;color:#6c7280}.wms-field input,.wms-field textarea,.wms-field select{padding:6px 10px;border:1px solid <meta charset="UTF-8">
<title>W-403 入荷実績一覧 — マルキ食品 WMS</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/test2.css?v=202605291437">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar"><div class="crumb">入荷　/　<b>入荷実績一覧 (W-403)</b><span class="badge">PHASE 1</span></div></div>
    <div class="content">
      <div class="two-pane">

        <!-- 左ペイン: 本体 -->
        <div class="left-pane">
  <div class="card"><div class="card-body">
          <div class="filter-row">
            <div class="field"><label>入荷日</label><input type="date" id="f-date"></div>
            <div class="field"><label>荷主</label><select id="f-owner"><option value="">全件</option></select></div>
            <div class="field"><label>差異あり</label><select id="f-diff"><option value="">全て</option><option value="yes">差異あり</option><option value="no">差異なし</option></select></div>
          </div>
          <div style="display:flex; gap:8px; margin-top:12px;">
            <button class="btn primary" onclick="render()">検索</button>
            <span id="stats" style="font-size:12px; color:var(--c-text-sub); margin-left:8px;">-</span>
          </div>
        </div></div>
        <div class="card">
          <div class="card-header"><span>入荷実績一覧</span><span class="meta" id="meta">-</span></div>
          <div class="card-body flush">
            <table class="list list-full">
              <thead><tr>
                <th>実績No</th><th>入荷予定</th><th>荷主</th><th>サプライヤー</th><th>検品日時</th><th class="right">予定数</th><th class="right">実績数</th><th class="right">差異</th><th class="center">状態</th>
              </tr></thead>
              <tbody id="tb"></tbody>
            </table>
          </div>
        </div>
        </div>

        <!-- 右ペイン: 入出荷/業務系情報 -->
        <div class="right-pane">

          <div class="card">
            <div class="card-header"><span>本日サマリ</span><span class="meta" style="font-size:11px; color:#9ca3af;">本日</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">合計</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">完了</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">進行中</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">待ち</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>進捗</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">SLA達成</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">SLA遅延</span><span class="val alert">-</span></div>
              <div class="summary-row"><span class="lbl">平均処理時間</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>要対応</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="mini-list">
              <div class="row"><span class="code">遅延</span><span class="name">SLA超過案件</span><span class="when">14:20</span></div>
              <div class="row"><span class="code">差異</span><span class="name">数量不一致</span><span class="when">12:08</span></div>
              <div class="row"><span class="code">保留</span><span class="name">承認待ち</span><span class="when">昨日</span></div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </main>
</div>
<script>
const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let all = [];
async function init() {
  const [owners, actuals] = await Promise.all([fetch('/api/owners').then(r=>r.json()), fetch('/api/inbound-actuals').then(r=>r.json()).catch(()=>[])]);
  all = actuals || [];
  const sel = document.getElementById('f-owner');
  (owners||[]).forEach(o => { const opt = document.createElement('option'); opt.value = o.code; opt.textContent = `${o.code} ${o.name}`; sel.appendChild(opt); });
  render();
}
const DISPLAY_LIMIT = 100;
function render() {
  const o = document.getElementById('f-owner').value, d = document.getElementById('f-diff').value;
  const dateF = document.getElementById('f-date').value;
  const rows = all.filter(a => {
    if (o && a.owner_code !== o) return false;
    if (dateF && (a.inspected_at || '').slice(0, 10) !== dateF) return false;
    const diff = (a.actual_qty || 0) - (a.planned_qty || 0);
    if (d === 'yes' && diff === 0) return false;
    if (d === 'no' && diff !== 0) return false;
    return true;
  });
  const shown = Math.min(rows.length, DISPLAY_LIMIT);
  document.getElementById('stats').textContent = `全${all.length}件 / 該当${rows.length}件 / 表示${shown}件`;
  document.getElementById('meta').textContent = `該当${rows.length}件中 ${shown}件表示${rows.length > DISPLAY_LIMIT ? ' (絞り込みで件数を減らしてください)' : ''}`;
  const tb = document.getElementById('tb');
  if (rows.length === 0) { tb.innerHTML = '<tr><td colspan="9" style="text-align:center; padding:24px; color:var(--c-text-sub);">入荷実績データなし（HT検品が完了すると蓄積されます）</td></tr>'; return; }
  tb.innerHTML = rows.slice(0, DISPLAY_LIMIT).map(a => {
    const diff = (a.actual_qty || 0) - (a.planned_qty || 0);
    return `<tr ${diff !== 0 ? 'style="background:var(--c-alert-lt);"' : ''}>
      <td class="num">${escapeHtml(a.actual_no || '-')}</td>
      <td class="num">${escapeHtml(a.schedule_no || '-')}</td>
      <td class="num">${escapeHtml(a.owner_code || '-')}</td>
      <td>${escapeHtml(a.supplier_name || '-')}</td>
      <td class="num">${escapeHtml(a.inspected_at || '-')}</td>
      <td class="right num">${a.planned_qty ?? '-'}</td>
      <td class="right num">${a.actual_qty ?? '-'}</td>
      <td class="right num ${diff !== 0 ? 'text-alert' : ''}">${diff > 0 ? '+' + diff : diff}</td>
      <td class="center"><span class="pill ${diff === 0 ? 'accent' : 'alert'}">${diff === 0 ? '正常' : '差異あり'}</span></td>
    </tr>`;
  }).join('');
}
init();
</script>
<script src="js/nav-manifest.js?v=202605291437"></script>
<script src="js/common-layout.js?v=202605291437"></script>
<script src="js/common-inout-stats.js?v=202605202324"></script>
</body>
</html>
