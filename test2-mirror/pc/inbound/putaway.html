<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>W-405 棚入れ指示一覧 — WMS テストサイト2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/test2.css?v=202605282215">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar"><div class="crumb">入荷　/　<b>棚入れ指示一覧 (W-405)</b><span class="badge">PHASE 1</span></div></div>
    <div class="content">
      <div class="two-pane">

        <!-- 左ペイン: 本体 -->
        <div class="left-pane">
  <div class="card"><div class="card-body">
          <div class="filter-row">
            <div class="field"><label>状態</label><select id="f-status"><option value="">全て</option><option value="pending">格納待ち</option><option value="picked">格納済</option></select></div>
            <div class="field"><label>商品</label><input id="f-product"></div>
          </div>
          <div style="display:flex; gap:8px; margin-top:12px;">
            <button class="btn primary" onclick="render()">検索</button>
            <span id="stats" style="font-size:12px; color:var(--c-text-sub); margin-left:8px;">-</span>
            <button class="btn" style="margin-left:auto;" onclick="location.href='/ht/putaway/instructions.html'">HT 棚入れ画面へ</button>
          </div>
        </div></div>
        <div class="card">
          <div class="card-header"><span>棚入れ指示一覧</span><span class="meta" id="meta">-</span></div>
          <div class="card-body flush">
            <table class="list list-full">
              <thead><tr>
                <th>指示No</th><th>商品</th><th>入荷No</th><th class="right">数量</th><th>仮置きロケ</th><th>推奨格納ロケ</th><th class="center">状態</th>
              </tr></thead>
              <tbody id="tb"></tbody>
            </table>
          </div>
        </div>
        </div>

        <!-- 右ペイン: 入出荷/業務系情報 -->
        <div class="right-pane">

          <div class="card">
            <div class="card-header"><span>本日サマリ</span><span class="meta" style="font-size:11px; color:#9ca3af;">本日</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">合計</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">完了</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">進行中</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">待ち</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>進捗</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">SLA達成</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">SLA遅延</span><span class="val alert">-</span></div>
              <div class="summary-row"><span class="lbl">平均処理時間</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>要対応</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="mini-list">
              <div class="row"><span class="code">遅延</span><span class="name">SLA超過案件</span><span class="when">14:20</span></div>
              <div class="row"><span class="code">差異</span><span class="name">数量不一致</span><span class="when">12:08</span></div>
              <div class="row"><span class="code">保留</span><span class="name">承認待ち</span><span class="when">昨日</span></div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </main>
</div>
<script>
const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let all = [];
async function init() {
  all = await fetch('/api/putaway-instructions').then(r=>r.json()).catch(()=>[]);
  render();
}
const DISPLAY_LIMIT = 100;
function render() {
  const s = document.getElementById('f-status').value, p = document.getElementById('f-product').value.trim().toLowerCase();
  const rows = (all || []).filter(r => {
    if (s && r.status !== s) return false;
    if (p && !(r.product_code || '').toLowerCase().includes(p)) return false;
    return true;
  });
  const shown = Math.min(rows.length, DISPLAY_LIMIT);
  document.getElementById('stats').textContent = `全${(all||[]).length}件 / 該当${rows.length}件 / 表示${shown}件`;
  document.getElementById('meta').textContent = `該当${rows.length}件中 ${shown}件表示${rows.length > DISPLAY_LIMIT ? ' (絞り込みで件数を減らしてください)' : ''}`;
  const tb = document.getElementById('tb');
  if (rows.length === 0) { tb.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:24px; color:var(--c-text-sub);">棚入れ指示なし（HT検品完了後に自動生成）</td></tr>'; return; }
  tb.innerHTML = rows.slice(0, DISPLAY_LIMIT).map(r => `
    <tr>
      <td class="num">${escapeHtml(r.id || '-')}</td>
      <td class="num">${escapeHtml(r.product_code || '-')}</td>
      <td class="num">${escapeHtml(r.schedule_no || '-')}</td>
      <td class="right num">${r.qty ?? '-'}</td>
      <td class="num">${escapeHtml(r.from_location || '仮置き')}</td>
      <td class="num text-accent text-bold">${escapeHtml(r.suggested_location || '3AP-02-001')}</td>
      <td class="center"><span class="pill ${r.status === 'picked' ? 'accent' : ''}">${escapeHtml(r.status || 'pending')}</span></td>
    </tr>
  `).join('');
}
init();
</script>
<script src="js/nav-manifest.js?v=202605282215"></script>
<script src="js/common-layout.js?v=202605282215"></script>
<script src="js/common-inout-stats.js?v=202605202324"></script>
</body>
</html>
