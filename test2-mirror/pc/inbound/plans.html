<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>W-401 入荷予定一覧 — WMS テストサイト2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/test2.css?v=202605282215">
<style>
/* 見せ方B (採用): 強弱・色は要対応のみ */
table.list-main td { padding:10px 12px; font-size:13px; }
table.list-main th { padding:8px 12px; font-size:11px; }
table.list-main tbody tr:hover { background:#f5f9fc; }
.side-strip { display:flex; gap:18px; padding:6px 0; font-size:11px; color:#6b7280; align-items:center; border-bottom:1px solid var(--c-line); margin-bottom:10px; flex-wrap:wrap; }
.side-strip .item { display:flex; gap:5px; }
.side-strip .item b { color:#374151; font-family:var(--f-mono); }
.side-strip .item.action b { color:var(--c-alert); }
.calm-alert { background:#fff; border-left:3px solid var(--c-alert); padding:6px 10px; margin-bottom:10px; font-size:12px; color:#374151; display:none; }
.calm-alert.show { display:block; }
.row-mute td { color:#6b7280; }
.row-mute .num, .row-mute .c-num, .row-mute .c-code, .row-mute .c-date { color:#374151; }
.pill.silent { background:#f3f4f6; color:#9ca3af; border-color:#e5e7eb; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div class="crumb">入荷　/　<b>入荷予定一覧 (W-401)</b><span class="badge">PHASE 1</span></div>
    </div>
    <div class="content">

      <div class="two-pane">

        <!-- 左ペイン: 本体 -->
        <div class="left-pane">
  <!-- 脇役: サマリは薄く・1行ストリップ -->
        <div class="side-strip">
          <div class="item"><span>本日</span><b id="sm-today">-</b></div>
          <div class="item"><span>未到着</span><b id="sm-pending">-</b></div>
          <div class="item"><span>検品済</span><b id="sm-inspected">-</b></div>
          <div class="item action"><span>遅延</span><b id="sm-late">-</b></div>
          <div class="item"><span>7日内</span><b id="sm-week">-</b></div>
          <div class="item"><span>全期間</span><b id="sm-total">-</b></div>
        </div>
  
        <!-- 控えめアラート: 状態の時だけ -->
        <div id="suggestion-bar" class="calm-alert"></div>
  
        <!-- 主役: 検索バー + 一覧テーブル -->
        <div class="card" style="border:1px solid var(--c-line);">
          <div class="card-body" style="background:#fbfbfb;">
            <div class="form-row">
              <div class="field"><label>入荷予定日</label><input type="date" id="f-date"></div>
              <div class="field"><label>ステータス</label>
                <select id="f-status">
                  <option value="">全て</option>
                  <option value="planned">未到着</option>
                  <option value="inspected">到着済</option>
                  <option value="completed">完了</option>
                </select>
              </div>
              <div class="field"><label>サプライヤー</label><input type="text" id="f-supplier" placeholder="サプライヤー名"></div>
              <div class="field"><label>荷主</label>
                <select id="f-owner"><option value="">全件</option></select>
              </div>
            </div>
            <div style="display:flex; gap:8px; margin-top:10px; align-items:center; flex-wrap:wrap;">
              <button class="btn primary" onclick="loadData()">検索</button>
              <button class="btn" onclick="resetFilter()">クリア</button>
              <span id="stats" style="font-size:11px; color:#9ca3af;">読込中…</span>
              <div style="margin-left:auto; display:flex; gap:6px;">
                <button class="btn" onclick="location.href='/pc/inbound/asn_import.html'" style="font-size:11px;">ASN取込</button>
                <button class="btn" onclick="location.href='/pc/inbound/register.html'" style="font-size:11px;">手入力登録</button>
                <button class="btn primary" onclick="location.href='/pc/inbound/register.html?no_asn=1'">ASNなし入荷</button>
              </div>
            </div>
          </div>
        </div>
  
        <div class="card">
          <div class="card-header"><span style="font-weight:700; font-size:13px;">入荷予定</span><span class="meta" id="meta" style="font-size:11px; color:#9ca3af;">-</span></div>
          <div class="card-body flush">
            <table class="list list-main">
              <thead><tr>
                <th class="c-code">伝票No</th>
                <th class="c-code">荷主</th>
                <th class="c-text">サプライヤー</th>
                <th class="c-date">予定日</th>
                <th class="c-num">明細</th>
                <th class="c-status">状態</th>
                <th class="c-action">操作</th>
              </tr></thead>
              <tbody id="tb-plans"></tbody>
            </table>
          </div>
        </div>
        </div>

        <!-- 右ペイン: 入出荷/業務系情報 -->
        <div class="right-pane">

          <div class="card">
            <div class="card-header"><span>本日サマリ</span><span class="meta" style="font-size:11px; color:#9ca3af;">本日</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">合計</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">完了</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">進行中</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">待ち</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>進捗</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">SLA達成</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">SLA遅延</span><span class="val alert">-</span></div>
              <div class="summary-row"><span class="lbl">平均処理時間</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>要対応</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="mini-list">
              <div class="row"><span class="code">遅延</span><span class="name">SLA超過案件</span><span class="when">14:20</span></div>
              <div class="row"><span class="code">差異</span><span class="name">数量不一致</span><span class="when">12:08</span></div>
              <div class="row"><span class="code">保留</span><span class="name">承認待ち</span><span class="when">昨日</span></div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </main>
</div>
<script>
const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let allRows = [];
const STATUS_LABEL = {
  planned:    { label: '到着待ち', cls: 'silent' },
  inspecting: { label: '入荷中',   cls: 'silent' },
  inspected:  { label: '検品済',   cls: 'silent' },
  completed:  { label: '完了',     cls: 'silent' },
};
const DISPLAY_LIMIT = 100;

async function loadOwners() {
  const owners = await fetch('/api/owners').then(r => r.json()).catch(() => []);
  const sel = document.getElementById('f-owner');
  owners.forEach(o => { const opt = document.createElement('option'); opt.value = o.code; opt.textContent = `${o.code} ${o.name}`; sel.appendChild(opt); });
}
async function loadData() {
  allRows = await fetch('/api/inbound-schedules').then(r => r.json()).catch(() => []);
  computeSummary();
  render();
}
function computeSummary() {
  const today = new Date().toISOString().slice(0, 10);
  const week = new Date(); week.setDate(week.getDate() + 7);
  const weekStr = week.toISOString().slice(0, 10);
  let smToday = 0, smPending = 0, smInspected = 0, smLate = 0, smWeek = 0;
  for (const r of allRows) {
    const d = r.scheduled_date || '';
    if (d === today) {
      smToday++;
      if (r.status === 'planned' || !r.status) smPending++;
      if (r.status === 'inspected' || r.status === 'completed') smInspected++;
    }
    if (d < today && (r.status === 'planned' || !r.status)) smLate++;
    if (d >= today && d <= weekStr) smWeek++;
  }
  document.getElementById('sm-today').textContent = smToday;
  document.getElementById('sm-pending').textContent = smPending;
  document.getElementById('sm-inspected').textContent = smInspected;
  document.getElementById('sm-late').textContent = smLate;
  document.getElementById('sm-week').textContent = smWeek;
  document.getElementById('sm-total').textContent = allRows.length;
  const bar = document.getElementById('suggestion-bar');
  if (smLate > 0) {
    bar.textContent = `遅延中の入荷予定が ${smLate} 件あります。仕入先確認をしてください。`;
    bar.classList.add('show');
  } else {
    bar.classList.remove('show');
  }
}
function render() {
  const ownerF = document.getElementById('f-owner').value;
  const statusF = document.getElementById('f-status').value;
  const supF = document.getElementById('f-supplier').value.trim().toLowerCase();
  const dateF = document.getElementById('f-date').value;
  const today = new Date().toISOString().slice(0, 10);
  const rows = allRows.filter(r => {
    if (ownerF && r.owner_code !== ownerF) return false;
    if (statusF && r.status !== statusF) return false;
    if (supF && !(r.supplier_name || '').toLowerCase().includes(supF)) return false;
    if (dateF && r.scheduled_date !== dateF) return false;
    return true;
  });
  const shown = Math.min(rows.length, DISPLAY_LIMIT);
  document.getElementById('stats').textContent = `全${allRows.length} / 該当${rows.length} / 表示${shown}`;
  document.getElementById('meta').textContent = `${shown}件`;
  const tb = document.getElementById('tb-plans');
  if (rows.length === 0) {
    tb.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:24px; color:#9ca3af;">該当データなし</td></tr>';
    return;
  }
  tb.innerHTML = rows.slice(0, DISPLAY_LIMIT).map(r => {
    const s = STATUS_LABEL[r.status] || { label: r.status, cls: 'silent' };
    const canDelete = r.status === 'planned';
    const isLate = (r.scheduled_date || '') < today && (r.status === 'planned' || !r.status);
    const dateStyle = isLate ? 'color:var(--c-alert); font-weight:600;' : '';
    const stPill = isLate ? '<span class="pill alert">遅延</span>' : `<span class="pill ${s.cls}">${escapeHtml(s.label)}</span>`;
    return `
      <tr class="${isLate ? '' : 'row-mute'}">
        <td class="c-code"><a href="/pc/inbound/plan_detail.html?id=${r.id}" style="color:var(--c-accent); font-weight:600;">${escapeHtml(r.schedule_no)}</a></td>
        <td class="c-code">${escapeHtml(r.owner_code || '-')}</td>
        <td class="c-text">${escapeHtml(r.supplier_name || '-')}</td>
        <td class="c-date" style="${dateStyle}">${escapeHtml(r.scheduled_date || '-')}</td>
        <td class="c-num">${r.line_count ?? '-'}</td>
        <td class="c-status">${stPill}</td>
        <td class="c-action">
          <a class="btn sm" href="/pc/inbound/plan_detail.html?id=${r.id}">詳細</a>
          ${canDelete ? `<button class="btn sm" style="background:var(--c-alert-lt); color:var(--c-alert);" onclick="deletePlan(${r.id}, '${escapeHtml(r.schedule_no)}')">削除</button>` : ''}
        </td>
      </tr>
    `;
  }).join('');
}
async function deletePlan(id, scheduleNo) {
  if (!confirm(`入荷予定 ${scheduleNo} を削除しますか？`)) return;
  try {
    const res = await fetch(`/api/inbound-schedules/${id}`, { method: 'DELETE' });
    if (!res.ok) { const err = await res.json().catch(()=>({})); alert(`削除失敗: ${err.error || res.status}`); return; }
    alert(`削除しました: ${scheduleNo}`);
    await loadData();
  } catch (e) { alert('削除エラー: ' + e.message); }
}
function resetFilter() {
  document.getElementById('f-date').value = '';
  document.getElementById('f-status').value = '';
  document.getElementById('f-supplier').value = '';
  document.getElementById('f-owner').value = '';
  render();
}
document.getElementById('f-owner').addEventListener('change', render);
document.getElementById('f-status').addEventListener('change', render);
document.getElementById('f-supplier').addEventListener('input', render);
document.getElementById('f-date').addEventListener('change', render);

(async () => { await loadOwners(); await loadData(); })();
</script>
<script src="js/nav-manifest.js?v=202605282215"></script>
<script src="js/common-layout.js?v=202605282215"></script>
<script src="js/common-inout-stats.js?v=202605202324"></script>
</body>
</html>
