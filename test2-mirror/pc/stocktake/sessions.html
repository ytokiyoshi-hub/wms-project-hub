<meta charset="UTF-8">
<title>棚卸セッション一覧 — マルキ食品 WMS</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/test2.css?v=202605300900">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar"><div class="crumb">棚卸　/　<b>セッション一覧</b><span class="badge">PHASE 1</span></div></div>
    <div class="content">
      <div class="two-pane">

        <!-- 左ペイン: 本体 -->
        <div class="left-pane">
  <div class="card"><div class="card-body">
          <div style="display:flex; gap:8px; align-items:center;">
            <input id="f-q" placeholder="セッションNo or 対象範囲" style="flex:1; border:1px solid var(--c-line-dk); padding:7px 10px;">
            <button class="btn primary" onclick="alert('「検索」モック動作（実装は後続フェーズ）')">検索</button>
            <button class="btn primary" style="margin-left:auto;" onclick="alert('「新規セッション」モック動作（実装は後続フェーズ）')">新規セッション</button>
          </div>
        </div></div>
        <div class="card">
          <div class="card-header"><span>棚卸セッション</span><span class="meta" id="meta">-</span></div>
          <div class="card-body flush">
            <table class="list list-full">
              <thead><tr>
                <th>セッションNo</th><th>モード</th><th>対象範囲</th><th>開始日時</th><th>終了予定</th><th class="right">対象ロケ</th><th class="right">完了ロケ</th><th class="center">状態</th>
              </tr></thead>
              <tbody id="tb">
              </tbody>
            </table>
          </div>
        </div>
  
        <div class="note-box">
          <div class="text-bold text-accent" style="margin-bottom:4px;">5種モード対応</div>
          日々 / ピッキング時 / 循環 / 月次 / 期末 — 荷主マスタの inventory_modes 設定で実行可能モードを管理（Q11-1 確定）
        </div>
        </div>

        <!-- 右ペイン: 入出荷/業務系情報 -->
        <div class="right-pane">

          <div class="card">
            <div class="card-header"><span>本日サマリ</span><span class="meta" style="font-size:11px; color:#9ca3af;">本日</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">合計</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">完了</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">進行中</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">待ち</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>進捗</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">SLA達成</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">SLA遅延</span><span class="val alert">-</span></div>
              <div class="summary-row"><span class="lbl">平均処理時間</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>要対応</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="mini-list">
              <div class="row"><span class="code">遅延</span><span class="name">SLA超過案件</span><span class="when">14:20</span></div>
              <div class="row"><span class="code">差異</span><span class="name">数量不一致</span><span class="when">12:08</span></div>
              <div class="row"><span class="code">保留</span><span class="name">承認待ち</span><span class="when">昨日</span></div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </main>
</div>
<script>
(function(){
  fetch('/api/stocktake-sessions').then(function(r){return r.json();}).then(function(data){
    if(!Array.isArray(data)||!data.length) return;
    function deriveStart(sno){
      var m=sno.match(/ST-(\d{2})(\d{2})(\d{2})/);
      return m?'20'+m[1]+'-'+m[2]+'-'+m[3]+' 18:00':'-';
    }
    function deriveEnd(sno){
      var m=sno.match(/ST-(\d{2})(\d{2})(\d{2})/);
      if(!m) return '-';
      var y=parseInt('20'+m[1]),mo=parseInt(m[2])-1,d=parseInt(m[3]);
      var dt=new Date(y,mo,d+1);
      var mm=String(dt.getMonth()+1).padStart(2,'0'),dd=String(dt.getDate()).padStart(2,'0');
      return dt.getFullYear()+'-'+mm+'-'+dd+' 03:00';
    }
    function pill(st){
      if(st==='完了') return '<span class="pill">完了</span>';
      if(st==='進行中') return '<span class="pill accent">進行中</span>';
      return '<span class="pill mute">'+st+'</span>';
    }
    var rows=data.map(function(s){
      return '<tr><td class="num">'+s.session_no+'</td><td>月次</td><td>WH001 全フロア</td><td class="num">'+deriveStart(s.session_no)+'</td><td class="num">'+deriveEnd(s.session_no)+'</td><td class="right num">'+s.planned_locations.toLocaleString()+'</td><td class="right num">'+s.counted_locations.toLocaleString()+'</td><td class="center">'+pill(s.status)+'</td></tr>';
    });
    document.getElementById('tb').innerHTML=rows.join('');
    document.getElementById('meta').textContent=data.length+'件中 '+data.length+'件表示';
  }).catch(function(){
    document.getElementById('meta').textContent='取得失敗';
  });
})();
</script>

</body>
</html>
