<html lang="ja">
<head>

<meta charset="UTF-8">
<title>W-301 出荷指示一覧 — WMS テストサイト2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/test2.css?v=202605282215">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar">
      <div class="crumb">出荷　/　<b>出荷指示一覧 (W-301)</b><span class="badge">PHASE 1</span></div>
    </div>
    <div class="content">
      <div class="two-pane">

        <!-- 左ペイン: 本体 -->
        <div class="left-pane">
  <div class="card"><div class="card-body">
          <div class="filter-row">
            <div class="field"><label>予定日</label><input type="date" id="f-date"></div>
            <div class="field"><label>ステータス</label>
              <select id="f-status">
                <option value="">全て</option>
                <option value="planned">未引当</option>
                <option value="allocated">引当済</option>
                <option value="picking">ピック中</option>
                <option value="picked">ピック完</option>
                <option value="shipped">出荷済</option>
              </select>
            </div>
            <div class="field"><label>荷主</label><select id="f-owner"><option value="">全件</option></select></div>
            <div class="field"><label>出荷先</label><input id="f-customer"></div>
          </div>
          <div style="display:flex; gap:8px; margin-top:12px; align-items:center;">
            <button class="btn primary" onclick="loadData()">検索</button>
            <span id="stats" style="font-size:12px; color:var(--c-text-sub);">読込中...</span>
            <div style="margin-left:auto; display:flex; gap:8px;">
              <button class="btn primary" onclick="alert('「出荷指示登録」モック動作（実装は後続フェーズ）')">出荷指示登録</button>
              <button class="btn" onclick="alert('「CSV取込」モック動作（実装は後続フェーズ）')">CSV取込</button>
            </div>
          </div>
        </div></div>
  
        <div class="card">
          <div class="card-header"><span>出荷指示一覧</span><span class="meta" id="meta">-</span></div>
          <div class="card-body flush">
            <table class="list list-full">
              <thead><tr>
                <th class="c-code">出荷No</th><th class="c-code">荷主</th><th class="c-text">出荷先</th><th class="c-text">予定日</th><th class="c-num">明細数</th><th class="c-status">ステータス</th><th class="c-action" style="width:200px;">操作</th>
              </tr></thead>
              <tbody id="tb-orders"></tbody>
            </table>
          </div>
        </div>
        </div>

        <!-- 右ペイン: 入出荷/業務系情報 -->
        <div class="right-pane">

          <div class="card">
            <div class="card-header"><span>本日サマリ</span><span class="meta" style="font-size:11px; color:#9ca3af;">本日</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">合計</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">完了</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">進行中</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">待ち</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>進捗</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">SLA達成</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">SLA遅延</span><span class="val alert">-</span></div>
              <div class="summary-row"><span class="lbl">平均処理時間</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>要対応</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="mini-list">
              <div class="row"><span class="code">遅延</span><span class="name">SLA超過案件</span><span class="when">14:20</span></div>
              <div class="row"><span class="code">差異</span><span class="name">数量不一致</span><span class="when">12:08</span></div>
              <div class="row"><span class="code">保留</span><span class="name">承認待ち</span><span class="when">昨日</span></div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </main>
</div>
<script>
const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let allRows = [];
async function loadOwners() {
  const owners = await fetch('/api/owners').then(r => r.json()).catch(() => []);
  const sel = document.getElementById('f-owner');
  owners.forEach(o => { const opt = document.createElement('option'); opt.value = o.code; opt.textContent = `${o.code} ${o.name}`; sel.appendChild(opt); });
}
async function loadData() {
  allRows = await fetch('/api/shipment-orders').then(r => r.json()).catch(() => []);
  render();
}
const STATUS_LABEL = { planned: { label: '未引当', cls: '' }, allocated: { label: '引当済', cls: 'accent' }, picking: { label: 'ピック中', cls: 'accent' }, picked: { label: 'ピック完', cls: 'accent' }, shipped: { label: '出荷済', cls: '' } };
function render() {
  const o = document.getElementById('f-owner').value, s = document.getElementById('f-status').value, c = document.getElementById('f-customer').value.trim().toLowerCase();
  const rows = allRows.filter(r => {
    if (o && r.owner_code !== o) return false;
    if (s && r.status !== s) return false;
    if (c && !(r.customer_name || '').toLowerCase().includes(c)) return false;
    return true;
  });
  const DISPLAY_LIMIT = 100;
  const shown = Math.min(rows.length, DISPLAY_LIMIT);
  document.getElementById('stats').textContent = `全${allRows.length}件 / 該当${rows.length}件 / 表示${shown}件`;
  document.getElementById('meta').textContent = `該当${rows.length}件中 ${shown}件表示${rows.length > DISPLAY_LIMIT ? ' (絞り込みで件数を減らしてください)' : ''}`;
  const tb = document.getElementById('tb-orders');
  if (rows.length === 0) { tb.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:24px; color:var(--c-text-sub);">該当データなし</td></tr>'; return; }
  tb.innerHTML = rows.slice(0, DISPLAY_LIMIT).map(r => {
    const st = STATUS_LABEL[r.status] || { label: r.status, cls: '' };
    return `<tr>
      <td class="c-code">${escapeHtml(r.order_no)}</td>
      <td class="c-code">${escapeHtml(r.owner_code || '-')}</td>
      <td class="c-text">${escapeHtml(r.customer_name || '-')}</td>
      <td class="c-text">${escapeHtml(r.scheduled_date || '-')}</td>
      <td class="c-num">${r.line_count ?? '-'}</td>
      <td class="c-status"><span class="pill ${st.cls}">${escapeHtml(st.label)}</span></td>
      <td class="c-action"><button class="btn sm" onclick="alert('「詳細」モック動作（実装は後続フェーズ）')">詳細</button> <button class="btn primary sm" onclick="location.href='ht/pick/wave.html'">HT ピックへ</button></td>
    </tr>`;
  }).join('');
}
(async () => { await loadOwners(); await loadData(); })();
</script>
<script src="js/nav-manifest.js?v=202605282215"></script>
<script src="js/common-layout.js?v=202605282215"></script>
<script src="js/common-inout-stats.js?v=202605202324"></script>
</body>
</html>
