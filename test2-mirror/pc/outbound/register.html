<meta charset="UTF-8">
<title>W-302 出荷指示登録 — WMS テストサイト2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/test2.css?v=202605290846">
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="main">
    <div class="topbar"><div class="crumb">出荷　/　<b>出荷指示登録 (W-302)</b><span class="badge">PHASE 1</span></div></div>
    <div class="content">
      <div class="two-pane">

        <!-- 左ペイン: 本体 -->
        <div class="left-pane">
  <div class="card"><div class="card-header"><span>出荷指示 ヘッダ情報</span></div><div class="card-body">
          <div class="form-row">
            <div class="field"><label>荷主</label><select id="f-owner"></select></div>
            <div class="field"><label>用途区分</label>
              <select id="f-purpose">
                <option value="normal">通常出荷</option>
                <option value="sample">サンプル</option>
                <option value="disposal">廃棄</option>
                <option value="return_to_supplier">仕入先返品</option>
              </select>
            </div>
            <div class="field"><label>希望出荷日</label><input type="date" id="f-date"></div>
            <div class="field"><label>配送業者</label>
              <select id="f-carrier">
                <option>CR001 ヤマト運輸</option>
                <option>CR002 佐川急便</option>
                <option>CR003 福山通運</option>
              </select>
            </div>
          </div>
          <div class="form-row" style="margin-top:14px;">
            <div class="field" style="grid-column:span 2;"><label>出荷先（取引先名）</label><input id="f-customer" placeholder="例: 東京食品センター"></div>
            <div class="field"><label>郵便番号</label><input id="f-zip" placeholder="100-0001"></div>
          </div>
          <div class="form-row" style="margin-top:14px;">
            <div class="field" style="grid-column:span 4;"><label>住所</label><input id="f-addr"></div>
          </div>
        </div></div>
  
        <div class="card"><div class="card-header"><span>明細</span><button class="btn sm primary" onclick="addLine()">+ 行追加</button></div>
          <div class="card-body flush">
            <table class="list list-full">
              <thead><tr>
                <th class="c-code" style="width:40px;">No</th><th class="c-code">商品コード</th><th class="c-text">商品名</th><th class="c-num">数量</th><th class="c-text">単位</th><th class="c-action" style="width:60px;">削除</th>
              </tr></thead>
              <tbody id="tb-lines"></tbody>
            </table>
          </div>
        </div>
  
        <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:14px;">
          <button class="btn" onclick="location.href='pc/outbound/orders.html'">キャンセル</button>
          <button class="btn primary" onclick="register()">登録</button>
        </div>
        </div>

        <!-- 右ペイン: 入出荷/業務系情報 -->
        <div class="right-pane">

          <div class="card">
            <div class="card-header"><span>本日サマリ</span><span class="meta" style="font-size:11px; color:#9ca3af;">本日</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">合計</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">完了</span><span class="val">-</span></div>
              <div class="summary-row"><span class="lbl">進行中</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">待ち</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>進捗</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="card-body" style="padding:0;">
              <div class="summary-row"><span class="lbl">SLA達成</span><span class="val accent">-</span></div>
              <div class="summary-row"><span class="lbl">SLA遅延</span><span class="val alert">-</span></div>
              <div class="summary-row"><span class="lbl">平均処理時間</span><span class="val mute">-</span></div>
            </div>
          </div>

          <div class="card" style="margin-top:14px;">
            <div class="card-header"><span>要対応</span><span class="meta" style="font-size:10px; color:#9ca3af;">モック</span></div>
            <div class="mini-list">
              <div class="row"><span class="code">遅延</span><span class="name">SLA超過案件</span><span class="when">14:20</span></div>
              <div class="row"><span class="code">差異</span><span class="name">数量不一致</span><span class="when">12:08</span></div>
              <div class="row"><span class="code">保留</span><span class="name">承認待ち</span><span class="when">昨日</span></div>
            </div>
          </div>

        </div>

      </div>
    </div>
  </main>
</div>
<script>
const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let lineNo = 0;
let products = [];

async function init() {
  const owners = await fetch('/api/owners').then(r=>r.json()).catch(()=>[]);
  products = await fetch('/api/products').then(r=>r.json()).catch(()=>[]);
  const sel = document.getElementById('f-owner');
  owners.forEach(o => { const opt = document.createElement('option'); opt.value = o.code; opt.textContent = `${o.code} ${o.name}`; sel.appendChild(opt); });
  addLine();
}

function addLine() {
  lineNo++;
  const opts = products.map(p => `<option value="${p.code}">${escapeHtml(p.code)} ${escapeHtml(p.name)}</option>`).join('');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td class="num">${lineNo}</td>
    <td><select class="line-product" style="width:100%; font-family:var(--f-mono);">${opts}</select></td>
    <td class="line-name">-</td>
    <td><input class="line-qty" type="number" value="1" style="width:80px; text-align:right; font-family:var(--f-mono);"></td>
    <td><select class="line-unit"><option>ケース</option><option>ピース</option></select></td>
    <td class="center"><button class="btn sm" onclick="this.closest('tr').remove()">×</button></td>
  `;
  document.getElementById('tb-lines').appendChild(tr);
  const sel = tr.querySelector('.line-product');
  const updateName = () => {
    const p = products.find(x => x.code === sel.value);
    tr.querySelector('.line-name').textContent = p ? p.name : '-';
  };
  sel.addEventListener('change', updateName);
  updateName();
}

async function register() {
  const lines = Array.from(document.querySelectorAll('#tb-lines tr')).map(tr => ({
    product_code: tr.querySelector('.line-product').value,
    qty: parseInt(tr.querySelector('.line-qty').value, 10),
    unit: tr.querySelector('.line-unit').value,
  })).filter(l => l.product_code && l.qty > 0);
  if (lines.length === 0) { alert('明細を1行以上入力'); return; }
  const body = {
    owner_code: document.getElementById('f-owner').value,
    purpose_type: document.getElementById('f-purpose').value,
    scheduled_date: document.getElementById('f-date').value,
    customer_name: document.getElementById('f-customer').value,
    postal_code: document.getElementById('f-zip').value,
    address: document.getElementById('f-addr').value,
    lines: lines,
  };
  try {
    const res = await fetch('/api/shipment-orders', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const data = await res.json();
    alert(`出荷指示登録: ${data.order_no || '完了'}`);
    location.href = 'pc/outbound/orders.html';
  } catch (e) {
    alert('登録エラー: ' + e.message);
  }
}
init();
</script>

</body>
</html>
